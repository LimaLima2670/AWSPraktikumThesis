<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ page.title }}</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">

</head>


<body>

<div class="wrapper">

<!-- ===== Sidebar ===== -->

<aside class="sidebar">

<h2>Navigation</h2>

<ul>

<li>
<a href="{{ '/docs/index.html' | relative_url }}"
class="{% if page.url == '/docs/' %}active{% endif %}">
Überblick
</a>
</li>

<li>
<a href="{{ '/docs/Versuch1/index.html' | relative_url }}"
class="{% if page.url contains 'Versuch1' %}active{% endif %}">
Versuch 1
</a>
</li>

<li>
<a href="{{ '/docs/Versuch2/index.html' | relative_url }}"
class="{% if page.url contains 'Versuch2' %}active{% endif %}">
Versuch 2
</a>
</li>

<li>
<a href="{{ '/docs/Versuch3/index.html' | relative_url }}"
class="{% if page.url contains 'Versuch3' %}active{% endif %}">
Versuch 3
</a>
</li>

<li>
<a href="{{ '/docs/Versuch4/index.html' | relative_url }}"
class="{% if page.url contains 'Versuch4' %}active{% endif %}">
Versuch 4
</a>
</li>

<li>
<a href="{{ '/docs/Versuch5/index.html' | relative_url }}"
class="{% if page.url contains 'Versuch5' %}active{% endif %}">
Versuch 5
</a>
</li>

</ul>

</aside>


<!-- ===== Content ===== -->

<main class="content">

<div class="page-container">

{% if page.title %}
<h1 class="page-title">{{ page.title }}</h1>
{% endif %}

{{ content }}

</div>

</main>

</div>

</body>

</html>
